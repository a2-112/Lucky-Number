<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=progress_activity"
    />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <title>Lucky Number</title>
  </head>
  <body>
    <header>
      <h1>Lucky Numbers</h1>
      <p>Your name is your destiny, type it and discover your fortune.</p>
    </header>
    <main>
      <div class="input-container">
        <label for="names">Enter your first and last name:</label>
        <input type="text" id="names" placeholder="Judy Chi" />
      </div>
      <button id="add-name">Check your fortune</button>
      <div>
        <span id="animation" hidden>
        <span class="material-symbols-outlined" id="icon">
          progress_activity</span
        >
        </span>
        <p id="error-message" hidden>
          Please enter your full name (first and last)
        </p>
      </div>

      <div id="result" hidden>
        <h2 id="lucky-number"></h2>
        <div id="card-container"></div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
